# Common project configuration

# LVGL
CONFIG_LVGL=y
CONFIG_LV_Z_MEM_POOL_SIZE=196608

# Enable larger Montserrat font sizes for readability
CONFIG_LV_FONT_MONTSERRAT_22=y
CONFIG_LV_FONT_MONTSERRAT_28=y

# Display blanking
CONFIG_DISPLAY=y

# Input system
CONFIG_INPUT=y

# Logging
CONFIG_LOG=y
CONFIG_LOG_BACKEND_UART=y

# Shell (optional, useful for debugging)
CONFIG_SHELL=n
