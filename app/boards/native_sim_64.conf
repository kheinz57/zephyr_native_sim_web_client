# Native simulator 64-bit configuration

# SDL Display Configuration
CONFIG_SDL_DISPLAY_ZOOM_PCT=100

# SDL GPIO emulation → keyboard keys act as virtual GPIO buttons
CONFIG_GPIO_EMUL=y
CONFIG_GPIO_EMUL_SDL=y
CONFIG_INPUT_GPIO_KEYS=y

# Heap for LVGL
CONFIG_HEAP_MEM_POOL_SIZE=16384000

# UART PTY Configuration
CONFIG_SERIAL=y
CONFIG_UART_NATIVE_PTY=y
# Create PTY on own pseudo-terminal (not stdin/stdout)
CONFIG_UART_NATIVE_PTY_0_ON_OWN_PTY=y
